<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
<title>Keranjang | lapakID</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f9fafb;--bg2:#f2f4f7;--card:#ffffff;--border:#e4e7ec;--text:#101828;--muted:#667085;--muted2:#475467;--purple:#465fff;--success:#12b76a;--danger:#f04438;--font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;}
body.dark-mode{--bg:#000;--bg2:#0a0a0a;--card:#111;--border:#222;--text:#fff;--muted:#888;--muted2:#aaa;}
body{background:var(--bg);color:var(--text);font-family:var(--font);transition:background .3s;min-height:100vh;display:flex;flex-direction:column}
.app-wrapper{display:flex;flex-direction:column;min-height:100vh}
nav{position:sticky;top:0;z-index:200;height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
@media(min-width:768px){nav{padding:0 40px}}
body.dark-mode nav{background:rgba(0,0,0,.96)}
.nav-logo{display:flex;align-items:center;gap:8px;font-size:.9rem;font-weight:800;color:var(--text);text-decoration:none}
.nav-logo-icon{width:28px;height:28px;border-radius:8px;overflow:hidden}
.nav-logo-icon img{width:100%;height:100%;object-fit:cover}
.nav-right{display:flex;align-items:center;gap:10px}
.saldo-card{display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--purple),#7c8eff);border-radius:99px;padding:5px 14px;cursor:pointer}
.saldo-value{font-size:.85rem;font-weight:800;color:#fff}
.cart-btn{display:flex;align-items:center;gap:5px;background:var(--purple);border:1px solid var(--purple);padding:5px 12px;border-radius:99px;text-decoration:none;color:#fff;font-size:.7rem}
.cart-badge{background:rgba(255,255,255,.3);border-radius:40px;padding:1px 6px;font-size:.55rem}
.dropdown{position:relative}
.dropdown-trigger{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);padding:4px 12px 4px 8px;border-radius:99px;cursor:pointer}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700}
.user-name{font-size:.7rem;font-weight:600;color:var(--text)}
.dropdown-arrow{font-size:.6rem;transition:transform .2s}
.dropdown.active .dropdown-arrow{transform:rotate(180deg)}
.dropdown-menu{position:absolute;top:calc(100% + 8px);right:0;background:var(--card);border:1px solid var(--border);border-radius:16px;min-width:180px;overflow:hidden;opacity:0;visibility:hidden;transform:translateY(-8px);transition:all .2s;z-index:300}
.dropdown.active .dropdown-menu{opacity:1;visibility:visible;transform:translateY(0)}
.dropdown-item{display:flex;align-items:center;gap:10px;padding:10px 16px;color:var(--text);font-size:.7rem;text-decoration:none;border-bottom:1px solid var(--border)}
.dropdown-item:last-child{border-bottom:none}
.dropdown-item:hover{background:var(--bg2);color:var(--purple)}
.dropdown-item.logout{color:var(--danger)}
.main-content{flex:1;max-width:1000px;margin:0 auto;padding:100px 24px 60px;width:100%}
.page-header{margin-bottom:24px}
.page-header h1{font-size:1.5rem;font-weight:800}
.cart-layout{display:flex;flex-direction:column;gap:24px}
@media(min-width:768px){.cart-layout{display:grid;grid-template-columns:1fr 320px}}
.cart-items{display:flex;flex-direction:column;gap:12px}
.cart-item{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.item-info .item-id{font-family:var(--mono);font-size:.85rem;font-weight:700}
.item-tier{display:inline-block;font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:40px;margin-top:6px}
.tier-low{background:rgba(107,114,128,.1);color:#6b7280}
.tier-medium{background:rgba(59,130,246,.1);color:#3b82f6}
.tier-high{background:rgba(249,115,22,.1);color:#f97316}
.tier-legend{background:rgba(234,179,8,.1);color:#eab308}
.item-price{font-size:1rem;font-weight:800;color:var(--purple)}
.remove-btn{background:var(--bg2);border:1px solid var(--border);border-radius:40px;padding:6px 12px;font-size:.65rem;cursor:pointer;color:var(--danger)}
.cart-summary{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;position:sticky;top:100px}
.summary-title{font-size:.7rem;font-weight:600;color:var(--muted);margin-bottom:16px}
.summary-row{display:flex;justify-content:space-between;margin-bottom:12px}
.summary-row.total{margin-top:16px;padding-top:16px;border-top:2px solid var(--border);font-weight:800;font-size:1rem}
.summary-row.total .value{color:var(--purple);font-size:1.2rem}
.checkout-btn{width:100%;background:var(--purple);color:#fff;border:none;padding:14px;border-radius:40px;font-weight:700;cursor:pointer;margin-top:16px}
.checkout-btn:disabled{opacity:0.5;cursor:not-allowed}
.empty-cart{text-align:center;padding:60px;color:var(--muted)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:10px 20px;border-radius:40px;z-index:9999;font-size:.7rem;animation:fadeOut 2s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0;visibility:hidden}}
footer{border-top:1px solid var(--border);padding:20px 24px;text-align:center;background:var(--card);font-size:.65rem}
.darkmode-toggle{position:fixed;bottom:20px;right:20px;width:44px;height:44px;border-radius:50%;background:var(--purple);border:none;cursor:pointer}
</style>
</head>
<body>
<div class="app-wrapper">
<nav>
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-icon"><img src="https://files.catbox.moe/34dics.png"/></div>
    lapakID
  </a>
  <div class="nav-right">
    <div class="saldo-card" id="saldoCard">
      <span class="saldo-value" id="saldoAmount">C.0</span>
    </div>
    <a href="cart.html" class="cart-btn">
      🛒 <span class="cart-badge" id="cartBadge">0</span>
    </a>
    <div class="dropdown" id="userDropdown">
      <div class="dropdown-trigger">
        <div class="user-avatar" id="navAvatar">A</div>
        <span class="user-name" id="navUsername">User</span>
        <span class="dropdown-arrow">▼</span>
      </div>
      <div class="dropdown-menu">
        <a href="dashboard.html" class="dropdown-item">🏠 Dashboard</a>
        <a href="id.html" class="dropdown-item">📦 Koleksi ID</a>
        <a href="cart.html" class="dropdown-item">🛒 Keranjang</a>
        <a href="topup.html" class="dropdown-item">💰 Top Up Coins</a>
        <div class="dropdown-item logout" id="logoutBtn">🚪 Logout</div>
      </div>
    </div>
  </div>
</nav>

<div class="main-content">
  <div class="page-header">
    <h1>Keranjang Belanja</h1>
    <p>Review ID yang akan kamu beli sebelum checkout</p>
  </div>

  <div id="cartContainer">
    <div class="empty-cart">Loading...</div>
  </div>
</div>

<footer>© 2026 lapakID — Keranjang Belanja</footer>
</div>

<button class="darkmode-toggle" id="darkModeToggle">🌙</button>

<script>
const API_URL = '/api';
let currentUser = null;
let cartItems = [];

async function checkAuth() {
  const token = localStorage.getItem('lapakid_token');
  if (!token) {
    window.location.href = 'index.html';
    return;
  }
  try {
    const res = await fetch(`${API_URL}/profile`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();
    if (data.success) {
      currentUser = data.data;
      document.getElementById('navAvatar').innerText = currentUser.nama.charAt(0).toUpperCase();
      document.getElementById('navUsername').innerText = currentUser.uid;
      document.getElementById('saldoAmount').innerHTML = `C.${(currentUser.coins || 0).toLocaleString()}`;
      loadCart();
    } else {
      localStorage.removeItem('lapakid_token');
      window.location.href = 'index.html';
    }
  } catch(e) {
    window.location.href = 'index.html';
  }
}

function loadCart() {
  cartItems = JSON.parse(localStorage.getItem('lapakid_cart') || '[]');
  document.getElementById('cartBadge').innerText = cartItems.length;
  renderCart();
}

function renderCart() {
  const container = document.getElementById('cartContainer');
  if (cartItems.length === 0) {
    container.innerHTML = `
      <div class="empty-cart">
        <h3>🛒 Keranjang Kosong</h3>
        <p>Belum ada ID yang ditambahkan</p>
        <a href="id.html" style="color:var(--purple);margin-top:16px;display:inline-block">Jelajahi ID →</a>
      </div>
    `;
    return;
  }

  const total = cartItems.reduce((sum, item) => sum + item.price, 0);
  const cukup = currentUser.coins >= total;

  container.innerHTML = `
    <div class="cart-layout">
      <div class="cart-items">
        ${cartItems.map((item, idx) => `
          <div class="cart-item">
            <div class="item-info">
              <div class="item-id">${item.id}</div>
              <span class="item-tier tier-${item.tier.toLowerCase()}">${item.tier}</span>
            </div>
            <div class="item-price">Rp${item.price.toLocaleString()}</div>
            <button class="remove-btn" data-index="${idx}">Hapus</button>
          </div>
        `).join('')}
      </div>
      <div class="cart-summary">
        <div class="summary-title">RINGKASAN</div>
        <div class="summary-row"><span>Total Item</span><span>${cartItems.length} ID</span></div>
        <div class="summary-row"><span>Total Harga</span><span>Rp${total.toLocaleString()}</span></div>
        <div class="summary-row"><span>Saldo Coins</span><span>C.${(currentUser.coins || 0).toLocaleString()}</span></div>
        <div class="summary-row total"><span>Setelah Bayar</span><span class="value">C.${(currentUser.coins - total).toLocaleString()}</span></div>
        <button class="checkout-btn" id="checkoutBtn" ${!cukup ? 'disabled' : ''}>${cukup ? 'Checkout Sekarang' : 'Saldo Tidak Cukup'}</button>
        ${!cukup ? `<p style="font-size:.6rem;color:var(--danger);text-align:center;margin-top:8px">Kekurangan Rp${(total - currentUser.coins).toLocaleString()}</p>` : ''}
        <a href="id.html" style="display:block;text-align:center;font-size:.7rem;color:var(--muted);margin-top:12px">+ Tambah ID Lagi</a>
      </div>
    </div>
  `;

  document.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', () => removeFromCart(parseInt(btn.dataset.index)));
  });
  document.getElementById('checkoutBtn')?.addEventListener('click', checkout);
}

function removeFromCart(index) {
  cartItems.splice(index, 1);
  localStorage.setItem('lapakid_cart', JSON.stringify(cartItems));
  loadCart();
  showToast('Item dihapus dari keranjang');
}

async function checkout() {
  if (cartItems.length === 0) return;
  
  const btn = document.getElementById('checkoutBtn');
  btn.disabled = true;
  btn.textContent = 'Memproses...';

  let successCount = 0;
  let failedItems = [];

  for (const item of cartItems) {
    try {
      const res = await fetch(`${API_URL}/buy`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${localStorage.getItem('lapakid_token')}`
        },
        body: JSON.stringify({ akunId: item.id })
      });
      const data = await res.json();
      if (data.success) {
        successCount++;
        // Update current user coins
        currentUser.coins = data.data.remainingCoins;
        document.getElementById('saldoAmount').innerHTML = `C.${currentUser.coins.toLocaleString()}`;
      } else {
        failedItems.push(item.id);
      }
    } catch(e) {
      failedItems.push(item.id);
    }
  }

  if (successCount > 0) {
    // Clear cart for successful purchases
    const remainingCart = cartItems.filter(item => failedItems.includes(item.id));
    localStorage.setItem('lapakid_cart', JSON.stringify(remainingCart));
    showToast(`${successCount} ID berhasil dibeli!`);
    loadCart();
  } else {
    showToast('Checkout gagal, coba lagi', 'error');
    btn.disabled = false;
    btn.textContent = 'Checkout Sekarang';
  }
}

function showToast(msg, type) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  if (type === 'error') toast.style.background = '#ef4444';
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2000);
}

function logout() {
  localStorage.removeItem('lapakid_token');
  localStorage.removeItem('lapakid_cart');
  window.location.href = 'index.html';
}

document.getElementById('saldoCard').onclick = () => window.location.href = 'topup.html';
document.getElementById('logoutBtn').onclick = logout;

// Dropdown
const drop = document.getElementById('userDropdown');
drop.addEventListener('click', (e) => { e.stopPropagation(); drop.classList.toggle('active'); });
document.addEventListener('click', () => drop.classList.remove('active'));

// Dark mode
function initDarkMode() {
  const btn = document.getElementById('darkModeToggle');
  let dark = localStorage.getItem('darkMode') === 'true';
  function apply(d) {
    if (d) document.body.classList.add('dark-mode');
    else document.body.classList.remove('dark-mode');
    btn.textContent = d ? '☀️' : '🌙';
    localStorage.setItem('darkMode', d);
  }
  apply(dark);
  btn.onclick = () => { dark = !dark; apply(dark); };
}

checkAuth();
initDarkMode();
</script>
</body>
</html>
